name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege — this workflow only reads the repo.
permissions:
  contents: read

jobs:
  frontend-check:
    name: Frontend lint + typecheck
    runs-on: ubuntu-latest
    # The React/Vite app lives in ui/ — all npm steps run there.
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and typecheck
        run: npm run check
